version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./cache:/app/cache   # Persist FAISS indexes across restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    command: >
      sh -c "pip install streamlit requests -q &&
             streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0"
    environment:
      - API_URL=http://api:8000
